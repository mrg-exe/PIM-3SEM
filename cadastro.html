<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Bem-Estar Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="estilo.css">
</head>
<body>

  <div id="app-header"></div>

  <main class="container-formulario form-auth" aria-label="Formulário de cadastro">

    <div style="text-align:center;margin-bottom:20px;">
      <span style="font-size:40px;" aria-hidden="true">📝</span>
      <h2>Criar uma conta</h2>
      <p>Preencha seus dados para acessar a farmácia digital.</p>
    </div>

    <!-- novalidate: desativa o balão nativo do browser; usamos nossa própria validação -->
    <form id="form-cadastro" onsubmit="criarConta(event)" novalidate>

      <div class="grupo-input">
        <label for="nome-cadastro">Nome Completo:</label>
        <input type="text" id="nome-cadastro" required
               placeholder="Seu nome e sobrenome"
               autocomplete="name">
      </div>

      <div class="grupo-input">
        <label for="nascimento-cadastro">Data de Nascimento:</label>
        <!-- max calculado pelo JS para não permitir datas futuras -->
        <input type="date" id="nascimento-cadastro" required
               autocomplete="bday">
      </div>

      <div class="grupo-input">
        <label for="email-cadastro">E-mail:</label>
        <input type="email" id="email-cadastro" required
               placeholder="Seu melhor e-mail"
               autocomplete="email">
      </div>

      <div class="grupo-input">
        <label for="cpf-cadastro">CPF:</label>
        <!-- Máscara aplicada pelo script.js via evento 'input' -->
        <input type="text" id="cpf-cadastro" required
               maxlength="14" placeholder="000.000.000-00"
               inputmode="numeric" autocomplete="off">
      </div>

      <div class="grupo-input">
        <label for="telefone-cadastro">Telefone (Celular):</label>
        <!-- Máscara aplicada pelo script.js via evento 'input' -->
        <input type="tel" id="telefone-cadastro" required
               maxlength="15" placeholder="(11) 90000-0000"
               autocomplete="tel">
      </div>

      <div class="grupo-input">
        <label for="senha-cadastro">Senha:</label>
        <input type="password" id="senha-cadastro" required
               placeholder="Mínimo de 6 caracteres"
               autocomplete="new-password">
      </div>

      <div class="grupo-input">
        <label for="confirma-senha">Confirmar Senha:</label>
        <input type="password" id="confirma-senha" required
               placeholder="Repita a senha"
               autocomplete="new-password">
      </div>

      <button type="submit" class="btn-primario-azul">Cadastrar</button>

    </form>

    <div class="link-alternativo">
      <p>Já possui uma conta? <a href="login.html">Faça login aqui</a></p>
    </div>

  </main>

  <footer class="rodape-inferior">
    <div class="bloco-texto" style="width:100%;text-align:center;">
      <p>&copy; 2026 Farmácia Bem-Estar Online. Tecnologia a favor da vida.</p>
    </div>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="script.js"></script>

  <script>
    // Define a data máxima do campo de nascimento como hoje
    document.getElementById('nascimento-cadastro').max =
      new Date().toISOString().split('T')[0];
  </script>
</body>
</html>
