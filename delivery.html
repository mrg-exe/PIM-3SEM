<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery Expresso - Bem-Estar Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="estilo.css">
</head>
<body>

  <div id="app-header"></div>

  <main class="container-formulario" aria-label="Formulário de delivery">

    <h2>Solicitar Delivery Expresso 🚚</h2>
    <p>Receba seus medicamentos em até 2 horas. Preencha os dados abaixo:</p>

    <!-- onsubmit unificado com os outros formulários; novalidate = nossa validação no JS -->
    <form id="form-delivery" onsubmit="enviarPedidoDelivery(event)" novalidate>

      <div class="grupo-input">
        <label for="endereco">Endereço Completo de Entrega:</label>
        <input type="text" id="endereco" required
               placeholder="Rua, Número, Bairro, CEP"
               autocomplete="street-address">
      </div>

      <div class="grupo-input">
        <label for="pedido">O que você precisa?</label>
        <textarea id="pedido" rows="4" required
                  placeholder="Ex: 1 caixa de Dipirona 500mg, 1 xarope para tosse..."></textarea>
      </div>

      <div class="grupo-input">
        <label for="receita">Anexar Receita Médica (se necessário):</label>
        <input type="file" id="receita" accept="image/*,.pdf"
               aria-describedby="receita-ajuda">
        <small id="receita-ajuda" style="color:#888;font-size:12px;margin-top:4px;">
          Formatos aceitos: imagem ou PDF.
        </small>
      </div>

      <!-- type="submit" + onsubmit no form = padrão consistente com as demais páginas -->
      <button type="submit" class="btn-confirmar">Confirmar Pedido</button>

    </form>

  </main>

  <footer class="rodape-inferior">
    <div class="bloco-texto" style="width:100%;text-align:center;">
      <p>&copy; 2026 Farmácia Bem-Estar Online. Tecnologia a favor da vida.</p>
    </div>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="script.js"></script>
</body>
</html>
