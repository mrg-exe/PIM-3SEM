<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Bem-Estar Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="estilo.css">
</head>
<body>

  <div id="app-header"></div>

  <main class="container-formulario form-auth" aria-label="Formulário de login">

    <div style="text-align:center;margin-bottom:20px;">
      <span style="font-size:40px;" aria-hidden="true">👤</span>
      <h2>Acesse sua conta</h2>
      <p>Bem-vindo de volta à Bem-Estar Online.</p>
    </div>

    <form id="form-login" onsubmit="fazerLogin(event)" novalidate>

      <div class="grupo-input">
        <label for="email-login">E-mail:</label>
        <input type="email" id="email-login" required
               placeholder="Digite seu e-mail"
               autocomplete="email">
      </div>

      <div class="grupo-input">
        <label for="senha-login">Senha:</label>
        <input type="password" id="senha-login" required
               placeholder="Digite sua senha"
               autocomplete="current-password">
      </div>

      <button type="submit" class="btn-primario-azul">Entrar</button>

    </form>

    <div class="link-alternativo">
      <p>Novo por aqui? <a href="cadastro.html">Crie sua conta agora</a></p>
    </div>

  </main>

  <footer class="rodape-inferior">
    <div class="bloco-texto" style="width:100%;text-align:center;">
      <p>&copy; 2026 Farmácia Bem-Estar Online. Tecnologia a favor da vida.</p>
    </div>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="script.js"></script>
</body>
</html>
